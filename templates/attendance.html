{% extends "base.html" %}

{% block content %}

<h2>Attendance Report</h2>

<table class="table table-bordered">
    <tr>
        <th>Name</th>
        <th>USN</th>
        <th>Date</th>
        <th>Status</th>
    </tr>

    {% for a in data %}
    <tr>
        <td>{{ a[0] }}</td>
        <td>{{ a[1] }}</td>
        <td>{{ a[2] }}</td>
        <td>{{ a[3] }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
